server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB
      max-request-size: 210MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:maulikgandhi111@gmail.com}
    password: ${MAIL_PASSWORD:zthuxugntsryejzw}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  jwt:
    secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationMustBe256BitsLong!!}
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:5173,https://admin-panel-git-master-chehar-temple-official-app.vercel.app,https://user-panel-git-master-chehar-temple-official-app.vercel.app
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    android-client-id: ${GOOGLE_ANDROID_CLIENT_ID}
  facebook:
    app-id: ${FACEBOOK_APP_ID}
    app-secret: ${FACEBOOK_APP_SECRET}
    page-access-token: ${FACEBOOK_PAGE_ACCESS_TOKEN}
    page-id: ${FACEBOOK_PAGE_ID}
  instagram:
    access-token: ${INSTAGRAM_ACCESS_TOKEN}
    user-id: ${INSTAGRAM_USER_ID}
  upload:
    base-path: ${UPLOAD_BASE_PATH:src/main/resources/uploads}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
